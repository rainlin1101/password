  <style>
    :root {
      --bg:#f7fbff; --card:#ffffff; --text:#16324f; --muted:#6b7c93;
      --brand:#2bbf6a; --brand2:#4ac7ff; --ok:#e9fbef; --okText:#15713c;
      --bad:#ffeef0; --badText:#b4232f; --border:#e7eef7;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC','Hiragino Sans','Yu Gothic',sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width: 430px; margin: 0 auto; min-height:100vh; padding:16px 14px 24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:22px; box-shadow:0 10px 28px rgba(31,83,143,.08); padding:16px; }
    .hero { color:#fff; background:linear-gradient(135deg,var(--brand),var(--brand2)); border:none; }
    .title { font-size:24px; font-weight:800; margin:0; }
    .sub { font-size:13px; color:var(--muted); margin-top:4px; }
    .btn { width:100%; border:none; border-radius:16px; padding:14px 12px; font-size:16px; font-weight:800; cursor:pointer; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-dark { background:#182a3a; color:#fff; }
    .btn-light { background:#fff; color:#223548; border:1px solid var(--border); }
    .btn-danger { background:#fff; color:#b4232f; border:1px solid #ffd2d8; }
    .stack > * + * { margin-top:10px; }
    .page { display:none; animation:fade .18s ease; }
    .page.active { display:block; }
    @keyframes fade { from {opacity:.2; transform:translateY(3px)} to {opacity:1; transform:none} }
    .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .progress { height:10px; border-radius:999px; background:#eaf0f8; overflow:hidden; }
    .bar { height:100%; width:0; background:linear-gradient(90deg,var(--brand),var(--brand2)); transition:.25s; }
    .jp { font-size:32px; line-height:1.2; margin:10px 0 0; font-weight:900; }
    .pill { display:inline-block; background:#eef8ff; color:#2f5b81; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .input { width:100%; height:54px; border-radius:15px; border:1px solid var(--border); padding:0 14px; font-size:20px; font-weight:800; text-transform:uppercase; }
    .feedback { border-radius:14px; padding:12px; font-size:14px; margin-top:10px; }
    .ok { background:var(--ok); color:var(--okText); }
    .bad { background:var(--bad); color:var(--badText); }
    .muted { color:var(--muted); }
    .small { font-size:13px; }
    .list-item { padding:12px; border-radius:14px; border:1px solid var(--border); background:#fff; }
    .score { font-size:40px; font-weight:900; color:var(--brand); margin:4px 0; }
  </style>
</head>

  <script>
    const STORAGE_KEYS = {
      wrongBook: 'aviation_quiz_wrong_book',
      lastScore: 'aviation_quiz_last_score',
      settings: 'aviation_quiz_settings',
      recentCategory: 'aviation_quiz_recent_category'
    };

    const questions = JSON.parse(document.getElementById('questions-data').textContent);
    const state = { mode: 'all', category: '', list: [], index: 0, input: '', submitted:false, isCorrect:false, correct:0 };

    const $ = (id) => document.getElementById(id);
    const pageIds = ['home','quiz','result','wrong','category'];
    const showPage = (id) => pageIds.forEach(p => $(p).classList.toggle('active', p === id));

    const read = (key, fallback) => { try { return JSON.parse(localStorage.getItem(key) || 'null') ?? fallback; } catch { return fallback; } };
    const write = (key, value) => localStorage.setItem(key, JSON.stringify(value));

    const normalizeAbbreviation = (v) => v.trim().replace(/\s+/g,' ').replace(/\s*\/\s*/g,'/').toUpperCase();
    const splitOptions = (abbr) => abbr.split('・').map(normalizeAbbreviation).filter(Boolean);
    const isCorrect = (input, answer) => splitOptions(answer).includes(normalizeAbbreviation(input));
    const shuffle = (arr) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };

    const getWrongBook = () => read(STORAGE_KEYS.wrongBook, []);
    const setWrongBook = (items) => write(STORAGE_KEYS.wrongBook, items);
    const addWrong = (q) => { const cur=getWrongBook(); if(!cur.some(x=>x.id===q.id)) setWrongBook([q,...cur]); };

    function renderHome() {
      const last = read(STORAGE_KEYS.lastScore, null);
      $('home').innerHTML = `
        <div class="card">
          <h1 class="title">航空用语略称练习</h1>
          <div class="sub">日语 → 英文略称</div>
        </div>
        <div class="card hero">
          <div class="small">轻量刷题模式</div>
          <div style="font-size:27px;font-weight:900;margin-top:4px">开始今天的练习</div>
          <div class="small" style="opacity:.95;margin-top:6px">共 ${questions.length} 题，随机打乱，手机优先。</div>
        </div>
        <div class="stack">
          <button class="btn btn-primary" onclick="startQuiz('all')">开始刷题</button>
          <button class="btn btn-light" onclick="openCategory()">分类练习</button>
          <button class="btn btn-light" onclick="openWrongBook()">错题本</button>
        </div>
        ${last ? `<div class='card'><div class='small muted'>最近成绩</div><div class='row'><div class='score'>${last.accuracy}%</div><div class='muted'>${last.correct} / ${last.total}</div></div></div>` : ''}
      `;
      showPage('home');
    }

    function openCategory() {
      const map = {};
      questions.forEach(q => map[q.category]=(map[q.category]||0)+1);
      const recent = localStorage.getItem(STORAGE_KEYS.recentCategory) || '';
      $('category').innerHTML = `
        <div class="card"><div class="row"><h2 style='margin:0'>分类练习</h2><button class='btn btn-light' style='width:auto;padding:8px 12px' onclick='renderHome()'>首页</button></div><div class='sub'>选择一个 category 开始</div></div>
        <div class='stack'>
          ${Object.entries(map).map(([k,v]) => `<button class='btn btn-light' style='text-align:left;${recent===k?'border-color:#2bbf6a;background:#effcf6':''}' onclick="startQuiz('category','${k}')"><div style='font-weight:800'>${k}</div><div class='small muted'>${v} 题</div></button>`).join('')}
        </div>`;
      showPage('category');
    }

    function openWrongBook() {
      const items = getWrongBook();
      $('wrong').innerHTML = `
        <div class='card'><div class='row'><h2 style='margin:0'>错题本</h2><button class='btn btn-light' style='width:auto;padding:8px 12px' onclick='renderHome()'>首页</button></div><div class='sub'>共 ${items.length} 题</div></div>
        <button class='btn btn-primary' ${items.length? '' : 'disabled style="opacity:.5"'} onclick="startQuiz('wrong')">只刷错题</button>
        <button class='btn btn-danger' onclick='clearWrongBook()'>清空全部错题</button>
        <div class='stack'>
          ${items.map(q=>`<div class='list-item'><div class='small muted'>${q.category}</div><div style='font-weight:800'>${q.japanese}</div><div class='small'>正确答案：<b>${q.abbreviation}</b></div><button class='btn btn-light' style='width:auto;padding:6px 10px;margin-top:8px' onclick='removeWrong(${q.id})'>删除</button></div>`).join('')}
        </div>`;
      showPage('wrong');
    }

    function clearWrongBook() { setWrongBook([]); openWrongBook(); }
    function removeWrong(id) { setWrongBook(getWrongBook().filter(x=>x.id!==id)); openWrongBook(); }

    function startQuiz(mode='all', category='') {
      let list = questions;
      if (mode === 'category') {
        list = questions.filter(q => q.category === category);
        localStorage.setItem(STORAGE_KEYS.recentCategory, category);
      }
      if (mode === 'wrong') list = getWrongBook();
      state.mode = mode; state.category = category; state.list = shuffle(list); state.index=0; state.input=''; state.submitted=false; state.isCorrect=false; state.correct=0;
      if (!state.list.length) { openResult(); return; }
      renderQuiz();
    }

    function submitQuiz() {
      if (state.submitted) return;
      const input = $('answer').value;
      state.input = input;
      state.submitted = true;
      const q = state.list[state.index];
      state.isCorrect = isCorrect(input, q.abbreviation);
      if (state.isCorrect) state.correct += 1;
      else addWrong(q);
      renderQuiz();
    }

    function nextQuiz() {
      if (!state.submitted) return;
      if (state.index + 1 >= state.list.length) { openResult(); return; }
      state.index += 1; state.input=''; state.submitted=false; state.isCorrect=false; renderQuiz();
    }

    function openResult() {
      const total = state.list.length;
      const correct = state.correct;
      const wrong = total - correct;
      const accuracy = total ? Math.round(correct / total * 100) : 0;
      const payload = { total, correct, wrong, accuracy, mode: state.mode, category: state.category || undefined, finishedAt: new Date().toISOString() };
      write(STORAGE_KEYS.lastScore, payload);

      $('result').innerHTML = `
        <div class='card'><div class='row'><h2 style='margin:0'>本轮结果</h2><button class='btn btn-light' style='width:auto;padding:8px 12px' onclick='renderHome()'>首页</button></div><div class='sub'>继续保持</div></div>
        <div class='card'><div class='small muted'>本轮完成</div><div class='score'>${accuracy}%</div><div class='small muted'>正确率</div>
          <div class='row' style='margin-top:10px'><div class='list-item' style='flex:1'><div class='small muted'>总题数</div><b>${total}</b></div><div class='list-item' style='flex:1;background:#e9fbef;border-color:#c5efd4'><div class='small'>正确</div><b>${correct}</b></div></div>
          <div class='list-item' style='margin-top:8px;background:#ffeef0;border-color:#ffd3d8'><div class='small'>错误</div><b>${wrong}</b></div>
        </div>
        <div class='stack'>
          <button class='btn btn-primary' onclick="startQuiz('all')">再来一轮</button>
          <button class='btn btn-light' onclick='openWrongBook()'>去错题本</button>
          <button class='btn btn-light' onclick='renderHome()'>回首页</button>
        </div>
      `;
      showPage('result');
    }

    function renderQuiz() {
      const q = state.list[state.index];
      const current = state.index + 1;
      const total = state.list.length;
      const pct = total ? Math.round(current / total * 100) : 0;
      $('quiz').innerHTML = `
        <div class='card'><div class='row'><div><h2 style='margin:0'>刷题中</h2><div class='sub'>日语 → 英文略称</div></div><button class='btn btn-light' style='width:auto;padding:8px 12px' onclick='renderHome()'>首页</button></div></div>
        <div class='card'><div class='row small muted'><span>进度 ${current} / ${total}</span><span>${pct}%</span></div><div class='progress' style='margin-top:8px'><div class='bar' style='width:${pct}%'></div></div></div>
        <div class='card'><span class='pill'>${q.category}</span><div class='small muted' style='margin-top:8px'>请输入对应的英文略称</div><div class='jp'>${q.japanese}</div></div>
        <div class='card'>
          <input id='answer' class='input' placeholder='输入 abbreviation，例如 ETA' value='${state.input.replace(/'/g, '&#39;')}' ${state.submitted?'disabled':''} />
          ${!state.submitted? `<button class='btn btn-primary' style='margin-top:10px' onclick='submitQuiz()'>提交</button>` : ''}
          ${state.submitted ? `<div class='feedback ${state.isCorrect?'ok':'bad'}'><div style='font-weight:800'>${state.isCorrect?'答对了！':'答错了，再记一遍！'}</div><div>正确答案：${q.abbreviation}</div><div>英文全称：${q.english}</div></div><button class='btn btn-dark' style='margin-top:10px' onclick='nextQuiz()'>下一题</button>` : ''}
        </div>
      `;
      const input = $('answer');
      if (input && !state.submitted) {
        input.focus();
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitQuiz(); });
      }
      showPage('quiz');
    }

    renderHome();
    window.startQuiz = startQuiz;
    window.openCategory = openCategory;
    window.openWrongBook = openWrongBook;
    window.renderHome = renderHome;
    window.submitQuiz = submitQuiz;
    window.nextQuiz = nextQuiz;
    window.clearWrongBook = clearWrongBook;
    window.removeWrong = removeWrong;
  </script>
